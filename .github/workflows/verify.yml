name: verify

on:
  push:
    branches: [main, prerelease]
  pull_request:
    branches: [main, prerelease]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run verify.py
        run: python verify.py
